<!DOCTYPE html>
<html lang="pt-br">

<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="assets/imagens/logos/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bpmf+Huninn&family=Playpen+Sans+Hebrew:wght@100..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.css">
  <title>Snake Game - by SID</title>
</head>

<body>
  <header>
    <div class="header">
      <a class="headerItem" href="https://www.instagram.com/joandesson_silva/" rel="noopener noreferrer" target="_blank"> <i class="fa-brands fa-instagram"></i></a>
      <a class="headerItem buttonLike" id="shareGame"><i class="fa-solid fa-share"></i></a>
      <a class="headerItem" href="https://github.com/sidxdesigner-prog" rel="noopener noreferrer" target="_blank"><i class="fa-brands fa-square-github"></i></a>
    </div>

    <img class="logo" src="assets/imagens/logos/logo principal.png" alt="Logomarca do Snake Game">

  </header>

  <main>

    <div class="gameRange">

      <div class="gameHeader">
        <p class="score gameHeaderItem">Score: <span class="spanScore "></span></p>
        <button class="buttonIsPauseOut gameHeaderItem"><i class="fa fa-play" aria-hidden="true"></i></button>
        <p class="nickname gameHeaderItem">Apelido: <span class="spanNickname"></span></p>
      </div>

      <canvas class="gameBoard"></canvas>
      
      <div class="title" id="title">
        <img src="assets/imagens/logos/logo principal.png"></img>
        <form>
          <input type="text" id="apelido" placeholder="Apelido" maxlength="10" minlength="5">
        </form>
        <button class="gameStart">Start</button>

      </div>
      <div id="typeDiv">
        <button id="buttonSkin">Change Skin</button>
        <button id="buttonMode">Change Mode</button>
      </div>

      <div class="gamePause" id="gamePause">
        <h1>O jogo <br> Está Pausado</h1>
        <div class="buttonPause">
          <button class="buttonIsPause home"><i class="fa-solid fa-house"></i></button>
          <button class="buttonIsPauseIn"><i class="fa fa-play" aria-hidden="true"></i></button>
          <button class="buttonIsPause restart"><i class="fa-solid fa-arrow-rotate-left"></i></button>
        </div>
      </div>

      <div class="gameOver" id="gameOver">
        <h1>Fim de Jogo</h1>
        <div class="divGameOver">
          <div class="status">
            <p class="gameOverNickname">nome: <span class="spanGameOverNickname"></span></p>
            <p class="gameOverScore">pontuação: <span class="spanGameOverScore"></span></p>
          </div>
          <div class="buttonsGameOver">
            <button class="buttonGameOverHome"><i class="fa-solid fa-house"></i></button>
            <button class="buttonGameOverRestart"><i class="fa-solid fa-arrow-rotate-left"></i></button>
          </div>
        </div>
      </div>

      <div id="skin">
        <div class="skinContent">
          <h2>Escolha sua Skin</h2>

          <ul class="skinSprite">
            <li class="sprite sTail"></li>
            <li class="sprite sBody"></li>
            <li class="sprite sHead"></li>
          </ul>

          <div class="skinGrid">
            <div class="skinItem" style="background-color: green;" data-valor="0"></div>
            <div class="skinItem" style="background-color: blue;" data-valor="1"></div>
            <div class="skinItem" style="background-color: yellow;" data-valor="2"></div>
            <div class="skinItem" data-valor="3"><img src="assets/imagens/gyarados/gyarados.png" alt="gyarados"></div>
            <div class="skinItem" data-valor="4"><img src="assets/imagens/onix/onix.png" alt="onix"></div>
            <div class="skinItem" data-valor="5"><img src="assets/imagens/serperior/serperior.png" alt="serperior">
            </div>
            <div class="skinItem" data-valor="6"><img src="assets/imagens/arbok/arbok.png" alt="arbok"></div>
            <div class="skinItem" data-valor="7"><img src="assets/imagens/rayquaza/rayquaza.png" alt="rayquaza"></div>
          </div>
          <button class="skinButtonModal">Concluir</button>
        </div>
      </div>

      <div id="mode">
        <div class="modeContent">
          <h2>Escolha o Modo de Jogo</h2>
          <div class="modeGrid">
            <div>
              <div class="modeItem classic" data-valor="classic"><img src="assets/imagens/div/classicMode.png" alt=""></div>
              <p>Clássico</p>
            </div>
            <div>
              <div class="modeItem infinite" data-valor="infinite"><img src="assets/imagens/div/infiniteMode.png" alt=""></div>
              <p>infinito</p>
            </div>
          </div>
          <button class="modeButtonModal">Concluir</button>
        </div>
      </div>
    </div>
    <div class="leaderboard">
  <h2>Top 3 Rankings</h2>
  <ul id="rankingList">
    <li>1. --- - 0</li>
    <li>2. --- - 0</li>
    <li>3. --- - 0</li>
  </ul>
</div>
  </main>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/input.js"></script>
  <script type="module" src="js/ui.js"></script>
</body>

</html>
