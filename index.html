<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bpmf+Huninn&family=Playpen+Sans+Hebrew:wght@100..800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.css">
  <title>Snake Game - by SID</title>
</head>

<body>
  <header>
    <div class="header">
      <a class="headerItem" href="http://"><i class="fa-brands fa-square-facebook"></i></a>
      <a class="headerItem" href="http://"><i class="fa-solid fa-share"></i></a>
      <a class="headerItem" href="http://"><i class="fa-brands fa-square-x-twitter"></i></a>
    </div>

    <img class="logo" src="assets/imagens/logo.png" alt="Logomarca do Snake Game">

  </header>

  <main>

    <div class="gameRange">

      <div class="gameHeader">
        <button class="buttonIsPause outsidePlay" onclick="gameIsPause()"><i class="fa fa-play"
            aria-hidden="true"></i></button>
      </div>

      <canvas class="gameBoard"></canvas>

      <div class="title" id="title">
        <h1><span>Poke</span> Game</h1>
        <form>
          <input type="text" id="apelido" placeholder="Apelido">
        </form>
        <button class="g-Start" onclick="startGame()">Start</button>
      </div>

      <div class="gamePause" id="gamePause">
        <h1>O jogo <br> Está Pausado</h1>
        <div class="buttonPause">
          <button class="buttonIsPause home" onclick="home()"><i class="fa-solid fa-house"></i></button>
          <button class="buttonIsPause insidePlay" onclick="gameIsPause()"><i class="fa fa-play" aria-hidden="true"></i></button>
          <button class="buttonIsPause restart" onclick="restart()"><i class="fa-solid fa-arrow-rotate-left"></i></button>
        </div>
      </div>

      <div id="skin" class="skinContainer">
        <div class="skinContent">
          <h2>Escolha sua Skin</h2>
          
          <ul class="skinSprite">
            <li class="sprite sHead"></li>
            <li class="sprite sBody"></li>
            <li class="sprite sTail"></li>
          </ul>

          <div class="skinGrid">
            <div class="skinItem" style="background-color: green;" data-valor="0"></div>
            <div class="skinItem" style="background-color: blue;" data-valor="1"></div>
            <div class="skinItem" style="background-color: yellow;" data-valor="2"></div>
            <div class="skinItem"  data-valor="4"></div>
            <div class="skinItem"  data-valor="5"></div>
            <div class="skinItem"  data-valor="6"></div>
            <div class="skinItem"  data-valor="7"></div>
            <div class="skinItem"  data-valor="8"><img src="assets/imagens/rayquaza/rayquaza.png" alt="rayquaza"></div>
          </div>
          <button class="skinButtonModal" onclick="fecharModal('skin')">Concluir</button>
        </div>
      </div>

      <div id="mode" class="modeContainer">
        <div class="modeContent">
          <h2>Escolha o<br>Modo de Jogo</h2>
          <div class="modeGrid">
            <div><div class="modeItem classic" data-valor="classic"></div>
            <p>Clássico</p></div>
            <div><div class="modeItem infinite" data-valor="infinite"></div>
            <p>infinito</p></div>
          </div>
          <button class="modeButtonModal" onclick="fecharModal('mode')">Concluir</button>
        </div>
      </div>
    </div>
    <footer>
      <button id="buttonSkin" onclick="abrirModal('skin')">Change Skin</button>
      <button id="buttonMode" onclick="abrirModal('mode')">Change Mode</button>
    </footer>
  </main>
  <script type="module" src="js/game.js"></script>
</body>

</html>
